<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise IT Support Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        .chat-container {
            overflow-y: auto;
            flex: 1;
            max-height: calc(100vh - 180px);
        }
        .user-bubble {
            background-color: #0d6efd;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .assistant-bubble {
            background-color: #f8f9fa;
            color: #212529;
            border-bottom-left-radius: 0.25rem;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #6c757d;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="d-flex flex-column bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-robot me-2"></i>
                Enterprise IT Support Assistant
            </span>
            <span class="navbar-text text-white-50 small">
                Ask about IT issues, tickets, employees, or policies
            </span>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex flex-column py-4">
        <div id="chat-container" class="chat-container">
            <div class="row mb-3">
                <div class="col-auto">
                    <div class="d-flex align-items-start gap-2">
                        <i class="bi bi-robot fs-4 text-primary"></i>
                        <div class="p-3 rounded-3 assistant-bubble">
                            Hello! How can I assist you today with IT support?<br><br>
                            Try asking:
                            <div class="mt-2 d-flex flex-wrap gap-2">
                                <button class="btn btn-outline-primary btn-sm quick-btn" data-question="My laptop won't start">
                                    <i class="bi bi-laptop me-1"></i>Laptop won't start
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-btn" data-question="My VPN is not connecting">
                                    <i class="bi bi-wifi me-1"></i>VPN issue
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-btn" data-question="My printer isn't printing">
                                    <i class="bi bi-printer me-1"></i>Printer issue
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-btn" data-question="Show employee Sarah">
                                    <i class="bi bi-person me-1"></i>Employee lookup
                                </button>
                                <button class="btn btn-outline-primary btn-sm quick-btn" data-question="What is the password policy?">
                                    <i class="bi bi-file-text me-1"></i>Password policy
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="ms-5 text-muted small mt-1">
                        <i class="bi bi-clock me-1"></i><span id="initial-time"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-3 border-top bg-white rounded-top-4 shadow-sm">
            <div class="input-group">
                <input type="text" class="form-control form-control-lg" id="question-input" 
                       placeholder="Type your question here..." autocomplete="off">
                <button class="btn btn-primary btn-lg" id="send-button">
                    <i class="bi bi-send me-1"></i>Send
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const questionInput = document.getElementById('question-input');
        const sendButton = document.getElementById('send-button');
        document.getElementById('initial-time').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        let currentConversationId = null;

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function addUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'row mb-3 justify-content-end';
            row.innerHTML = `
                <div class="col-auto">
                    <div class="d-flex align-items-start gap-2 flex-row-reverse">
                        <i class="bi bi-person-circle fs-4 text-primary"></i>
                        <div class="p-3 rounded-3 user-bubble">
                            ${escapeHtml(text)}
                        </div>
                    </div>
                    <div class="text-end text-muted small mt-1 me-5">
                        <i class="bi bi-clock me-1"></i>${formatTime(new Date())}
                    </div>
                </div>
            `;
            chatContainer.appendChild(row);
            scrollToBottom();
        }

        function addTypingIndicator() {
            const row = document.createElement('div');
            row.className = 'row mb-3';
            row.id = 'typing-indicator';
            row.innerHTML = `
                <div class="col-auto">
                    <div class="d-flex align-items-start gap-2">
                        <i class="bi bi-robot fs-4 text-primary"></i>
                        <div class="p-3 rounded-3 assistant-bubble">
                            <div class="typing-indicator">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(row);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function addAssistantMessage(data) {
            const row = document.createElement('div');
            row.className = 'row mb-3';
            
            let content = `<div class="p-3 rounded-3 assistant-bubble">${escapeHtml(data.response || data.message || '')}</div>`;

            if (data.data) {
                if (data.data.ticket_id) {
                    content += `
                        <div class="mt-3">
                            <div class="card border-primary">
                                <div class="card-header bg-primary text-white">
                                    <i class="bi bi-ticket me-2"></i>Ticket ${data.data.ticket_id}
                                </div>
                                <div class="card-body">
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <strong>Issue:</strong> ${data.data.issue}<br>
                                            <strong>Priority:</strong> <span class="badge ${data.data.priority === 'High' ? 'bg-danger' : data.data.priority === 'Medium' ? 'bg-warning text-dark' : 'bg-secondary'}">${data.data.priority}</span><br>
                                            <strong>Category:</strong> ${data.data.category}
                                        </div>
                                        <div class="col-md-6">
                                            <strong>Status:</strong> <span class="badge bg-success">${data.data.status}</span><br>
                                            <strong>Assigned Team:</strong> ${data.data.assigned_team}
                                        </div>
                                        ${data.data.suggested_resolution ? `
                                            <div class="col-12 mt-2">
                                                <div class="alert alert-info mb-0">
                                                    <i class="bi bi-lightbulb me-1"></i><strong>Suggested Resolution:</strong> ${data.data.suggested_resolution}
                                                </div>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (data.data.id && data.data.name) {
                    content += `
                        <div class="mt-3">
                            <div class="card border-info">
                                <div class="card-header bg-info text-white">
                                    <i class="bi bi-person-badge me-2"></i>${data.data.name}
                                </div>
                                <div class="card-body">
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <strong>ID:</strong> ${data.data.id}<br>
                                            <strong>Department:</strong> ${data.data.department}<br>
                                            <strong>Designation:</strong> ${data.data.designation}
                                        </div>
                                        <div class="col-md-6">
                                            <strong>Manager:</strong> ${data.data.manager}<br>
                                            <strong>Email:</strong> ${data.data.email}<br>
                                            <strong>Phone:</strong> ${data.data.phone}<br>
                                            <strong>Office:</strong> ${data.data.office_location}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (data.data.id && data.data.title) {
                    content += `
                        <div class="mt-3">
                            <div class="card border-success">
                                <div class="card-header bg-success text-white">
                                    <i class="bi bi-file-earmark-text me-2"></i>${data.data.title}
                                </div>
                                <div class="card-body">
                                    ${data.data.description}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            
            row.innerHTML = `
                <div class="col-auto">
                    <div class="d-flex align-items-start gap-2">
                        <i class="bi bi-robot fs-4 text-primary"></i>
                        ${content}
                    </div>
                    <div class="ms-5 text-muted small mt-1">
                        <i class="bi bi-clock me-1"></i>${formatTime(new Date())}
                    </div>
                </div>
            `;
            chatContainer.appendChild(row);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            addUserMessage(question);
            questionInput.value = '';
            sendButton.disabled = true;
            addTypingIndicator();
            
            try {
                const requestBody = { question: question };
                if (currentConversationId) {
                    requestBody.conversation_id = currentConversationId;
                }

                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.conversation_id) {
                    currentConversationId = data.conversation_id;
                }

                addAssistantMessage(data);
            } catch (error) {
                removeTypingIndicator();
                const row = document.createElement('div');
                row.className = 'row mb-3';
                row.innerHTML = `
                    <div class="col-auto">
                        <div class="d-flex align-items-start gap-2">
                            <i class="bi bi-robot fs-4 text-primary"></i>
                            <div class="p-3 rounded-3 alert alert-danger mb-0">
                                Oops! Something went wrong. Please try again.
                            </div>
                        </div>
                        <div class="ms-5 text-muted small mt-1">
                            <i class="bi bi-clock me-1"></i>${formatTime(new Date())}
                        </div>
                    </div>
                `;
                chatContainer.appendChild(row);
                scrollToBottom();
            } finally {
                sendButton.disabled = false;
                questionInput.focus();
            }
        }

        sendButton.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });

        document.addEventListener('click', (e) => {
            if (e.target.closest('.quick-btn')) {
                const btn = e.target.closest('.quick-btn');
                const question = btn.getAttribute('data-question');
                if (question) {
                    questionInput.value = question;
                    sendQuestion();
                }
            }
        });

        questionInput.focus();
    </script>
</body>
</html>
